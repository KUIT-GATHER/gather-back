name: PR Discord Notify
on:
  pull_request:
    types: [opened, closed]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"PR #${{ github.event.number }} **${{ github.event.action }}**: ${{ github.event.pull_request.title }}\n${{ github.event.pull_request.html_url }}\"}" \
            ${{ secrets.DISCORD_WEBHOOK }}