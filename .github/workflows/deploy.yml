name: Deploy Gather Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build Spring Boot jar
        run: ./gradlew clean bootJar -x test

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          cp build/libs/*.jar deploy/gather.jar.new

      - name: Set up SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/gather-backend-key.pem
          chmod 600 ~/.ssh/gather-backend-key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload jar and deploy script to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/gather-backend-key.pem deploy/gather.jar.new "$EC2_USER@$EC2_HOST:/opt/gather/gather.jar.new"
          scp -i ~/.ssh/gather-backend-key.pem scripts/deploy.sh "$EC2_USER@$EC2_HOST:/opt/gather/deploy.sh"

      - name: Run deploy script on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/gather-backend-key.pem "$EC2_USER@$EC2_HOST" "chmod +x /opt/gather/deploy.sh && /opt/gather/deploy.sh"