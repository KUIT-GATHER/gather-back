    SignupRequest:
      type: object
      required:
        - name
        - birthDate
        - gender
        - phoneNumber
        - email
        - password
        - passwordConfirm
        - nickname
        - activityRegionIds
        - interestCategoryIds
        - serviceTermsAgreed
        - privacyPolicyAgreed
        - marketingAgreed
      properties:
        name:
          type: string
          maxLength: 12
          description: 이름. 한글은 최대 7자, 영문은 최대 12자, 한글/영문 혼합 입력은 최대 12자까지 허용합니다.
          example: 홍길동
        birthDate:
          type: string
          format: date
          description: 생년월일. yyyy-MM-dd 형식이며 미래 날짜는 허용하지 않습니다.
          example: '2002-03-15'
        gender:
          $ref: '#/components/schemas/Gender'
        phoneNumber:
          type: string
          pattern: '^[0-9]+$'
          description: 전화번호. 숫자만 전달합니다. 서버에서 하이픈과 공백을 제거해 정규화합니다.
          example: '01012345678'
        email:
          type: string
          format: email
          maxLength: 255
          description: 이메일. 이메일 인증 완료가 필요합니다. 서버에서 앞뒤 공백 제거 및 소문자화합니다.
          example: test@example.com
        password:
          type: string
          minLength: 6
          maxLength: 12
          description: 비밀번호. 6자 이상 12자 이하입니다.
          example: password123!
        passwordConfirm:
          type: string
          minLength: 6
          maxLength: 12
          description: 비밀번호 확인
          example: password123!
        nickname:
          type: string
          minLength: 2
          maxLength: 8
          description: 닉네임. 2자 이상 8자 이하입니다.
          example: 길동
        introduction:
          type: string
          maxLength: 50
          nullable: true
          description: 소개글. 최대 50자입니다.
          example: 함께 봉사하고 싶습니다.
        activityRegionIds:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          description: 활동 지역 ID 목록. 1개 이상 3개 이하입니다.
          items:
            type: integer
            format: int64
          example:
            - 1
            - 2
        interestCategoryIds:
          type: array
          minItems: 1
          uniqueItems: true
          description: 관심 카테고리 ID 목록. 1개 이상입니다.
          items:
            type: integer
            format: int64
          example:
            - 1
            - 4
            - 5
        serviceTermsAgreed:
          type: boolean
          description: 서비스 이용약관 동의 여부. true 필수입니다.
          example: true
        privacyPolicyAgreed:
          type: boolean
          description: 개인정보 처리방침 동의 여부. true 필수입니다.
          example: true
        marketingAgreed:
          type: boolean
          description: 맞춤형 봉사/이벤트 알림 수신 동의 여부. 선택 동의입니다.
          example: false

