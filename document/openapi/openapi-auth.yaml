openapi: 3.0.3

info:
  title: Gather Auth API
  description: |
    Gather 서비스 인증 및 회원가입 관련 API 명세입니다.

    프론트 연동 참고사항:
    - `signup`, `login`, `logout`, `reissue`는 인증 행위 API이므로 동사형 경로를 사용합니다.
    - `regions`, `categories` 조회 API는 auth 도메인 소유는 아니지만 회원가입 화면에서 필요하므로 함께 명세에 포함했습니다.
    - 관심 카테고리는 `GET /api/v1/categories` 응답의 `id`를 기준으로 선택합니다.
    - 회원가입 요청에는 선택한 카테고리 ID 배열인 `interestCategoryIds`만 전달하며, `code`는 전달하지 않습니다.
    - 카테고리 `id`는 DB 참조용, `code`는 프론트 아이콘·색상·필터 칩 매핑용 고정값, `name`은 화면 표시용입니다.
    - 로그아웃은 Access Token 없이 Refresh Token만으로 요청합니다.
    - 로그아웃은 같은 Refresh Token으로 여러 번 요청해도 성공 응답을 반환합니다.
  version: 1.0.0

servers:
  - url: /
    description: Relative server URL

tags:
  - name: Auth
    description: 인증, 회원가입, 토큰 관련 API
  - name: Signup Support
    description: 회원가입 보조 조회 API

paths:
  /api/v1/auth/email-verifications:
    post:
      tags:
        - Auth
      summary: 이메일 인증 코드 발송
      description: 회원가입에 사용할 이메일로 인증 코드를 발송합니다.
      operationId: sendEmailVerificationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationSendRequest'
            example:
              email: test@example.com
      responses:
        '200':
          description: 이메일 인증 코드 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationSendApiResponse'
              example:
                success: true
                data:
                  email: test@example.com
                  expiresAt: '2026-06-28T12:10:00'
                  message: 인증 코드가 발송되었습니다.
                error: null
        '400':
          description: 요청 값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
        '409':
          description: 이미 사용 중인 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: DUPLICATE_EMAIL
                  message: 이미 사용 중인 이메일입니다.
        '500':
          description: 이메일 발송 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: EMAIL_SEND_FAILED
                  message: 이메일 발송에 실패했습니다.

  /api/v1/auth/email-verifications/confirm:
    post:
      tags:
        - Auth
      summary: 이메일 인증 코드 확인
      description: 사용자가 입력한 이메일 인증 코드가 유효한지 확인합니다.
      operationId: confirmEmailVerificationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
            example:
              email: test@example.com
              code: '123456'
      responses:
        '200':
          description: 이메일 인증 코드 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationConfirmApiResponse'
              example:
                success: true
                data:
                  email: test@example.com
                  verified: true
                  verifiedAt: '2026-06-28T12:05:00'
                error: null
        '400':
          description: 요청 값 검증 실패 또는 인증 코드 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                validationError:
                  summary: 요청 값 검증 실패
                  value:
                    success: false
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: 요청 값이 올바르지 않습니다.
                invalidVerificationCode:
                  summary: 인증 코드 불일치
                  value:
                    success: false
                    data: null
                    error:
                      code: INVALID_VERIFICATION_CODE
                      message: 인증 코드가 올바르지 않습니다.
                expiredVerificationCode:
                  summary: 인증 코드 만료
                  value:
                    success: false
                    data: null
                    error:
                      code: EXPIRED_VERIFICATION_CODE
                      message: 인증 코드가 만료되었습니다.
        '404':
          description: 이메일 인증 요청 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: EMAIL_VERIFICATION_NOT_FOUND
                  message: 이메일 인증 요청을 찾을 수 없습니다.

  /api/v1/auth/phone-numbers/availability:
    post:
      tags:
        - Auth
      summary: 전화번호 중복 확인
      description: 회원가입 기본 정보 단계에서 입력한 전화번호가 이미 가입에 사용되었는지 확인합니다.
      operationId: checkPhoneNumberAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberAvailabilityRequest'
            example:
              phoneNumber: '01012345678'
      responses:
        '200':
          description: 전화번호 중복 확인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberAvailabilityApiResponse'
              examples:
                available:
                  summary: 사용 가능한 전화번호
                  value:
                    success: true
                    data:
                      phoneNumber: '01012345678'
                      available: true
                    error: null
                unavailable:
                  summary: 이미 사용 중인 전화번호
                  value:
                    success: true
                    data:
                      phoneNumber: '01012345678'
                      available: false
                    error: null
        '400':
          description: 요청 값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.

  /api/v1/auth/signup:
    post:
      tags:
        - Auth
      summary: 회원가입
      description: 기본 정보, 계정 정보, 프로필 정보, 활동 지역, 관심 카테고리, 약관 동의를 한 번에 제출하여 회원가입을 완료합니다. 회원가입 성공 시 토큰은 발급하지 않습니다.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            example:
              name: 홍길동
              birthDate: '2002-03-15'
              gender: MALE
              phoneNumber: '01012345678'
              email: test@example.com
              password: password123!
              passwordConfirm: password123!
              nickname: 길동
              introduction: 함께 봉사하고 싶습니다.
              activityRegionIds:
                - 1
                - 2
              interestCategoryIds:
                - 1
                - 4
                - 5
              serviceTermsAgreed: true
              privacyPolicyAgreed: true
              marketingAgreed: false
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupApiResponse'
              example:
                success: true
                data:
                  userId: 1
                  email: test@example.com
                  name: 홍길동
                  nickname: 길동
                error: null
        '400':
          description: 요청 값 검증 실패 또는 비즈니스 규칙 위반
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                validationError:
                  summary: 단일 필드 검증 실패
                  value:
                    success: false
                    data: null
                    error:
                      code: VALIDATION_ERROR
                      message: 요청 값이 올바르지 않습니다.
                passwordMismatch:
                  summary: 비밀번호 확인 불일치
                  value:
                    success: false
                    data: null
                    error:
                      code: PASSWORD_MISMATCH
                      message: 비밀번호가 일치하지 않습니다.
                emailNotVerified:
                  summary: 이메일 인증 미완료
                  value:
                    success: false
                    data: null
                    error:
                      code: EMAIL_NOT_VERIFIED
                      message: 이메일 인증이 완료되지 않았습니다.
                requiredTermsNotAgreed:
                  summary: 필수 약관 미동의
                  value:
                    success: false
                    data: null
                    error:
                      code: REQUIRED_TERMS_NOT_AGREED
                      message: 필수 약관 동의가 필요합니다.
                invalidActivityRegionCount:
                  summary: 활동 지역 개수 오류
                  value:
                    success: false
                    data: null
                    error:
                      code: INVALID_ACTIVITY_REGION_COUNT
                      message: 활동 지역은 1개 이상 3개 이하로 선택해야 합니다.
                invalidInterestCategoryCount:
                  summary: 관심 카테고리 개수 오류
                  value:
                    success: false
                    data: null
                    error:
                      code: INVALID_INTEREST_CATEGORY_COUNT
                      message: 관심 카테고리는 1개 이상 선택해야 합니다.
        '404':
          description: 활동 지역 또는 관심 카테고리 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                regionNotFound:
                  summary: 활동 지역 없음
                  value:
                    success: false
                    data: null
                    error:
                      code: REGION_NOT_FOUND
                      message: 활동 지역을 찾을 수 없습니다.
                categoryNotFound:
                  summary: 관심 카테고리 없음
                  value:
                    success: false
                    data: null
                    error:
                      code: CATEGORY_NOT_FOUND
                      message: 관심 카테고리를 찾을 수 없습니다.
        '409':
          description: 중복 데이터 존재
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                duplicateEmail:
                  summary: 이메일 중복
                  value:
                    success: false
                    data: null
                    error:
                      code: DUPLICATE_EMAIL
                      message: 이미 사용 중인 이메일입니다.
                duplicatePhoneNumber:
                  summary: 전화번호 중복
                  value:
                    success: false
                    data: null
                    error:
                      code: DUPLICATE_PHONE_NUMBER
                      message: 이미 사용 중인 전화번호입니다.
                duplicateNickname:
                  summary: 닉네임 중복
                  value:
                    success: false
                    data: null
                    error:
                      code: DUPLICATE_NICKNAME
                      message: 이미 사용 중인 닉네임입니다.

  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      description: 이메일과 비밀번호를 검증한 뒤 Access Token과 Refresh Token을 발급합니다.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: test@example.com
              password: password123!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenApiResponse'
              example:
                success: true
                data:
                  accessToken: access-token-value
                  refreshToken: refresh-token-value
                  tokenType: Bearer
                error: null
        '400':
          description: 요청 값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
        '401':
          description: 로그인 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: INVALID_LOGIN
                  message: 이메일 또는 비밀번호가 올바르지 않습니다.
        '403':
          description: 계정 상태로 인한 로그인 차단
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                suspendedUser:
                  summary: 이용 정지 계정
                  value:
                    success: false
                    data: null
                    error:
                      code: SUSPENDED_USER
                      message: 이용 정지된 계정입니다.
                withdrawnUser:
                  summary: 탈퇴 계정
                  value:
                    success: false
                    data: null
                    error:
                      code: WITHDRAWN_USER
                      message: 탈퇴한 계정입니다.

  /api/v1/auth/reissue:
    post:
      tags:
        - Auth
      summary: 토큰 재발급
      description: Refresh Token을 검증한 뒤 새로운 Access Token과 Refresh Token을 발급합니다.
      operationId: reissueToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenReissueRequest'
            example:
              refreshToken: refresh-token-value
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenApiResponse'
              example:
                success: true
                data:
                  accessToken: new-access-token-value
                  refreshToken: new-refresh-token-value
                  tokenType: Bearer
                error: null
        '400':
          description: 요청 값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
        '401':
          description: Refresh Token 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                invalidToken:
                  summary: 유효하지 않은 토큰
                  value:
                    success: false
                    data: null
                    error:
                      code: INVALID_TOKEN
                      message: 유효하지 않은 토큰입니다.
                expiredToken:
                  summary: 만료된 토큰
                  value:
                    success: false
                    data: null
                    error:
                      code: EXPIRED_TOKEN
                      message: 만료된 토큰입니다.
                revokedToken:
                  summary: 폐기된 토큰
                  value:
                    success: false
                    data: null
                    error:
                      code: REVOKED_TOKEN
                      message: 폐기된 토큰입니다.
        '403':
          description: 사용자 상태로 인한 재발급 차단
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              examples:
                suspendedUser:
                  summary: 이용 정지 계정
                  value:
                    success: false
                    data: null
                    error:
                      code: SUSPENDED_USER
                      message: 이용 정지된 계정입니다.
                withdrawnUser:
                  summary: 탈퇴 계정
                  value:
                    success: false
                    data: null
                    error:
                      code: WITHDRAWN_USER
                      message: 탈퇴한 계정입니다.

  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: 로그아웃
      description: |
        Refresh Token 하나를 폐기합니다.

        Access Token 인증을 요구하지 않으며 Refresh Token만으로 처리합니다.
        이는 Access Token이 만료된 상태에서도 사용자가 로그아웃할 수 있도록 하기 위함입니다.

        이미 폐기되었거나 만료된 Refresh Token도 서버에 기록이 존재하면 성공 응답을 반환합니다(멱등 처리).
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
            example:
              refreshToken: refresh-token-value
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutApiResponse'
              example:
                success: true
                data: null
                error: null
        '400':
          description: 요청 값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
        '401':
          description: 유효하지 않은 Refresh Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorApiResponse'
              example:
                success: false
                data: null
                error:
                  code: INVALID_TOKEN
                  message: 유효하지 않은 토큰입니다.

  /api/v1/regions:
    get:
      tags:
        - Signup Support
      summary: 활동 지역 목록 조회
      description: 회원가입 프로필 단계에서 선택 가능한 활동 지역 목록을 조회합니다. 인증이 필요 없습니다.
      operationId: getRegions
      responses:
        '200':
          description: 활동 지역 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionListApiResponse'
              example:
                success: true
                data:
                  - id: 1
                    name: 서울
                  - id: 2
                    name: 경기
                error: null

  /api/v1/categories:
    get:
      tags:
        - Signup Support
      summary: 관심 카테고리 목록 조회
      description: 회원가입 프로필 단계에서 선택 가능한 관심 카테고리 목록을 조회합니다. 인증이 필요 없습니다.
      operationId: getCategories
      responses:
        '200':
          description: 관심 카테고리 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListApiResponse'
              example:
                success: true
                data:
                  - id: 1
                    code: ENVIRONMENT
                    name: 환경
                  - id: 2
                    code: EDUCATION
                    name: 교육
                error: null

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Gender:
      type: string
      description: 성별
      enum:
        - MALE
        - FEMALE
      example: MALE

    Role:
      type: string
      description: 사용자 권한. 회원가입 요청에서는 전달하지 않고 서버가 USER를 기본 저장합니다.
      enum:
        - USER
        - ADMIN
      example: USER

    UserStatus:
      type: string
      description: 사용자 계정 상태. 회원가입 요청에서는 전달하지 않고 서버가 ACTIVE를 기본 저장합니다.
      enum:
        - ACTIVE
        - SUSPENDED
        - WITHDRAWN
      example: ACTIVE

    CategoryCode:
      type: string
      description: 카테고리 의미 고정값
      enum:
        - ENVIRONMENT
        - EDUCATION
        - CULTURE
        - COMMUNITY
        - WELFARE
        - OVERSEAS
      example: ENVIRONMENT

    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 에러 코드
          example: VALIDATION_ERROR
        message:
          type: string
          description: 에러 메시지
          example: 요청 값이 올바르지 않습니다.

    ErrorApiResponse:
      type: object
      required:
        - success
        - data
        - error
      properties:
        success:
          type: boolean
